    summary = "Multiply line 8 by 12.4% (0.124)."

      [[forms.years.fields.sources]]
      file = "docs/f1040es_2026.pdf"
      page = 9
      section = "Line 9"

    [[forms.years.fields]]
    key = "line_10"
    label = "Line 10"
    summary = "Add lines 4 and 9. Enter the result here and on line 9 of your 2026 Estimated Tax Worksheet."

      [[forms.years.fields.sources]]
      file = "docs/f1040es_2026.pdf"
      page = 9
      section = "Line 10"

    [[forms.years.fields]]
    key = "line_11"
