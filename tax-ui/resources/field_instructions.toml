[[forms]]
id = "1040-es"
title = "Form 1040-ES"

  [[forms.years]]
  year = 2025

    [[forms.years.fields]]
    key = "expected_agi"
    label = "Expected AGI"
    summary = "Adjusted gross income you expect in 2025."
    detail = """When figuring the adjusted gross income you expect in 2025, consider the current-year items called out in the form instructions. If you are self-employed, subtract the deductible part of self-employment tax by using the 2025 Self-Employment Tax and Deduction Worksheet."""

      [[forms.years.fields.sources]]
      file = "docs/f1040es_2025.pdf"
      page = 5
      section = "Line 1"

    [[forms.years.fields]]
    key = "expected_deduction"
    label = "Expected deduction"
    summary = "Deductions."
    detail = """If you plan to itemize deductions, enter the estimated total of your itemized deductions. If you do not plan to itemize deductions, enter your standard deduction."""

      [[forms.years.fields.sources]]
      file = "docs/f1040es_2025.pdf"
      page = 8
      section = "Line 2a"

    [[forms.years.fields]]
    key = "expected_qbi_deduction"
    label = "QBI deduction"
    summary = "If you can take the qualified business income deduction, enter the estimated amount of the deduction."

      [[forms.years.fields.sources]]
      file = "docs/f1040es_2025.pdf"
      page = 8
      section = "Line 2b"

    [[forms.years.fields]]
    key = "expected_amt"
    label = "AMT"
    summary = "Alternative minimum tax from Form 6251."

      [[forms.years.fields.sources]]
      file = "docs/f1040es_2025.pdf"
      page = 8
      section = "Line 5"

    [[forms.years.fields]]
    key = "expected_credits"
    label = "Credits"
    summary = "Credits. Do not include any income tax withholding on this line."
    detail = """See the 2024 Form 1040 or 1040-SR, line 19, Schedule 3 (Form 1040), lines 1 through 6z, and the related instructions for the types of credits allowed."""

      [[forms.years.fields.sources]]
      file = "docs/f1040es_2025.pdf"
      page = 5
      section = "Line 7"

      [[forms.years.fields.sources]]
      file = "docs/f1040es_2025.pdf"
      page = 8
      section = "Line 7"

    [[forms.years.fields]]
    key = "expected_other_taxes"
    label = "Other taxes"
    summary = "Other taxes."
    detail = """Use the 2024 Instructions for Form 1040 to determine whether you expect to owe taxes that would have been entered on 2024 Schedule 2 (Form 1040), line 8 through 12, 14 through 17z, and line 19. Include household employment taxes on this line only if you will also have withholding from other income or would still need estimated payments without the household employment taxes. Do not include taxes that are not due until the return due date, such as uncollected Social Security or Medicare tax on tips, certain recapture and excise taxes, or look-back interest."""

      [[forms.years.fields.sources]]
      file = "docs/f1040es_2025.pdf"
      page = 5
      section = "Line 10"

      [[forms.years.fields.sources]]
      file = "docs/f1040es_2025.pdf"
      page = 6
      section = "Additional Medicare Tax / NIIT"

    [[forms.years.fields]]
    key = "expected_withholding"
    label = "Withholding"
    summary = "Income tax withheld and estimated to be withheld during 2025, including withholding on pensions, annuities, certain deferred income, and Additional Medicare Tax withholding."

      [[forms.years.fields.sources]]
      file = "docs/f1040es_2025.pdf"
      page = 8
      section = "Line 13"

    [[forms.years.fields]]
    key = "prior_year_tax"
    label = "Prior year tax"
    summary = "Required annual payment based on prior year's tax."
    detail = """Enter the 2024 tax figured under the form instructions unless an exception applies. If the AGI shown on your 2024 return is more than $150,000, or more than $75,000 if married filing separately for 2025, use 110% of your 2024 tax instead. If you did not file a 2024 return or the 2024 tax year was less than 12 full months, do not complete line 12b and use line 12a on line 12c instead. The instructions also explain how to adjust prior-year tax if your joint-filing status changes."""

      [[forms.years.fields.sources]]
      file = "docs/f1040es_2025.pdf"
      page = 6
      section = "Line 12b"

  [[forms.years]]
  year = 2026

    [[forms.years.fields]]
    key = "expected_agi"
