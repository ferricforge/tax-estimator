    summary = "Multiply line 10 by 50% (0.50)."
    detail = """This is your expected deduction for self-employment tax on Schedule 1 (Form 1040), line 15. Subtract this amount when figuring your expected AGI on line 1 of your 2026 Estimated Tax Worksheet."""

      [[forms.years.fields.sources]]
